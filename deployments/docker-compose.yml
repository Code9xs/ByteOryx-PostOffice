services:
  app:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    ports:
      - "25:25"
      - "587:587"
      - "993:993"
      - "8080:8080"
    environment:
      - PO_HOSTNAME=${MAIL_HOSTNAME:-mail.example.com}
      - PO_DB_HOST=postgres
      - PO_DB_PORT=5432
      - PO_DB_NAME=postoffice
      - PO_DB_USER=postoffice
      - PO_DB_PASSWORD=${DB_PASSWORD:-postoffice}
      - PO_REDIS_URL=redis://redis:6379
      - PO_S3_ENDPOINT=minio:9000
      - PO_S3_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - PO_S3_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - PO_S3_BUCKET=postoffice
      - PO_JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - PO_WEB_DIR=/var/www/postoffice
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postoffice
      POSTGRES_USER: postoffice
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postoffice}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postoffice"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
